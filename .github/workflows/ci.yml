# Gate mínimo de PR/push — o deploy é automático (GitHub→Vercel), então lint+build
# precisam passar ANTES do merge (auditoria 16/07/2026: não havia gate nenhum).
name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 3 erros pré-existentes (Sidebar/ThemeToggle setState-in-effect, dashboard render)
      # documentados na auditoria de 16/07 — travar o lint quando zerarem
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
